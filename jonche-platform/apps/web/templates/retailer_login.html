{% extends "base_public.html" %}
{% block title %}JONCHE — Retailer Login{% endblock %}

{% block content %}
<div class="public-card">
  <div class="public-brand">
    <div class="logo-wordmark">JONCHE</div>
    <div class="logo-sub">Retailer Portal</div>
  </div>

  <h1 class="public-title">Retailer Sign In</h1>
  <p class="public-subtitle">View allocations and submit purchase orders.</p>

  {% if error %}
  <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="post" class="form">
    <input type="hidden" name="next" value="{{ next or '/retailer' }}">
    <label class="label">Email</label>
    <input class="input" type="email" name="email" autocomplete="username" required>

    <label class="label">Password</label>
    <input class="input" type="password" name="password" autocomplete="current-password" required>

    <button class="btn-primary full" type="submit">LOGIN</button>
  </form>
</div>
{% endblock %}
