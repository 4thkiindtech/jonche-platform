<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JONCHE{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="noise-overlay"></div>
  {% if request.path.startswith('/store') or request.path.startswith('/account') %}
  <nav class="navbar navbar-dark navbar-expand-lg" style="background: rgba(0,0,0,0.55); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; z-index: 300;">
    <div class="container py-2">
      <a class="navbar-brand" href="/store" style="font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.12em;">
        JONCHE
      </a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="/store/cart">
          <i class="fa-solid fa-bag-shopping"></i> Cart
        </a>
        <a class="btn btn-outline-light btn-sm" href="/account/login">
          <i class="fa-regular fa-user"></i> Account
        </a>
      </div>
    </div>
  </nav>
  {% endif %}
  <main class="public">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
