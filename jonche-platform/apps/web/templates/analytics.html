{% extends "base.html" %}
{% block title %}JONCHE — Analytics{% endblock %}

{% block content %}
<div class="topbar">
  <div>
    <div class="page-title">ANALYTICS</div>
    <div class="page-subtitle">Revenue, hype, and QR conversion signals</div>
  </div>
  <div class="topbar-right">
    <button class="btn-ghost" onclick="window.location.reload()">REFRESH</button>
  </div>
</div>

<div class="grid-2">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">REVENUE BY DROP</div>
      <span class="panel-action" onclick="window.location.reload()">SYNC</span>
    </div>
    <div id="analytics-revenue" class="table"></div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">HYPE</div>
      <span class="panel-action" onclick="window.location.reload()">SYNC</span>
    </div>
    <div id="analytics-hype" class="table"></div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/analytics.js') }}"></script>
{% endblock %}
